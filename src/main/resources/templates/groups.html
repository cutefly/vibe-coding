<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Groups</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }

        h1,
        h2 {
            color: #333;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th,
        td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: left;
        }

        th {
            background-color: #f2f2f2;
        }

        .form-container {
            margin-top: 30px;
            padding: 20px;
            border: 1px solid #eee;
            background-color: #f9f9f9;
        }

        .form-container label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }

        .form-container input[type="text"] {
            width: calc(100% - 22px);
            padding: 10px;
            margin-bottom: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        .form-container button {
            background-color: #4CAF50;
            color: white;
            padding: 10px 15px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        .form-container button:hover {
            background-color: #45a049;
        }

        .actions a {
            margin-right: 10px;
            text-decoration: none;
            color: #007bff;
        }

        .actions a:hover {
            text-decoration: underline;
        }

        .delete-link {
            color: #dc3545;
        }

        nav {
            margin-bottom: 20px;
        }

        nav a {
            margin-right: 15px;
            text-decoration: none;
            font-weight: bold;
            color: #333;
        }

        nav a:hover {
            color: #007bff;
        }
    </style>
</head>

<body>
    <nav>
        <a th:href="@{/users}">User Management</a>
        <a th:href="@{/groups}">Group Management</a>
    </nav>

    <h1>Group Management</h1>

    <div class="form-container">
        <h2>Add New Group</h2>
        <form action="#" th:action="@{/groups}" th:object="${group}" method="post">
            <label for="name">Group Name:</label>
            <input type="text" id="name" th:field="*{name}" required>
            <button type="submit">Add Group</button>
        </form>
    </div>

    <h2>Existing Groups</h2>
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Users Count</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="group : ${groups}">
                <td th:text="${group.id}"></td>
                <td th:text="${group.name}"></td>
                <td th:text="${#sets.size(group.users)}"></td>
                <td class="actions">
                    <a th:href="@{/groups/edit/{id}(id=${group.id})}">Edit</a>
                    <a th:href="@{/groups/delete/{id}(id=${group.id})}" class="delete-link"
                        onclick="return confirm('Are you sure you want to delete this group?');">Delete</a>
                </td>
            </tr>
        </tbody>
    </table>
</body>

</html>
